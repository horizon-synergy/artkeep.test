<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtKeep</title>
    <meta name="description" content="ArtKeep — a minimal, fast notes app for creatives." />
    <meta name="theme-color" content="#1a1917" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-180.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/index-CnNlHTke.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D-DutItb.css">
  </head>
  <body>
    <!--
      Loading screen rendered by raw HTML/CSS before React hydrates.
      Removed by main.jsx after first render completes.
    -->
    <div id="app-loader">
      <div class="loader-inner">
        <img src="/logo.svg" alt="ArtKeep logo" class="loader-logo" />
        <span class="loader-name">ArtKeep</span>
        <div class="loader-spinner" aria-label="Loading">
          <div class="loader-spinner-ring"></div>
        </div>
      </div>
    </div>

    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      @media (prefers-color-scheme: dark) {
        #app-loader { background: #141412; }
        .loader-name { color: #f0ede8 !important; }
        .loader-spinner-ring {
          border-color: #2e2c28 !important;
          border-top-color: #f59e0b !important;
        }
      }

      #app-loader.loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: loaderFadeIn 0.4s ease both;
      }

      .loader-logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      }

      .loader-name {
        font-family: 'Roboto', ui-sans-serif, system-ui, sans-serif;
        font-style: italic;
        font-size: 1.875rem;
        letter-spacing: -0.01em;
        color: #1a1917;
        line-height: 1;
      }

      .loader-spinner {
        width: 22px;
        height: 22px;
        margin-top: 4px;
      }

      .loader-spinner-ring {
        width: 22px;
        height: 22px;
        border: 2.5px solid #e4e2dc;
        border-top-color: #d97706;
        border-radius: 50%;
        animation: loaderSpin 0.7s linear infinite;
      }

      @keyframes loaderSpin {
        to { transform: rotate(360deg); }
      }

      @keyframes loaderFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>

    <div id="root"></div>
  </body>
</html>
